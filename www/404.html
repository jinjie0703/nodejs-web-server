<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>404 Not Found - 自定义错误页</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: #fce4e4;
    "
  >
    <h1 style="color: #c0392b; font-size: 80px; margin: 0">404</h1>
    <h2>抱歉，找不到这个页面</h2>
    <p>您请求的资源在服务器本地 `www/` 目录下不存在。</p>
    <a
      href="/"
      style="
        display: inline-block;
        background-color: #3498db;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        margin-top: 20px;
      "
      >返回首页</a
    >
  </body>
</html>
